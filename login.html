<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - WiFi Voucher</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #fff;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 400px;
        background: #ffffff;
        padding: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        border-radius: 16px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 92%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 12px;
        background-color: #d32f2f;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
    }

    button:hover {
        background-color: #b71c1c;
    }

    p {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    a {
        color: #d32f2f;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
    <p>No account? <a href="index.html">Sign up</a></p>
</div>
    <script>
    document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyD7D3G3ODNufEUt9X8qLxK6-mSZA4XmtYc",
    authDomain: "getvoucher-abefa.firebaseapp.com",
    projectId: "getvoucher-abefa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", async ()=>{

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Fill all fields");
        return;
    }

    const cleanUser = username.toLowerCase().replace(/[^a-z0-9]/g,"");
    const email = cleanUser + "@voucher.local";

    try{
        const userCredential = await signInWithEmailAndPassword(auth,email,password);
        const user = userCredential.user;

        const userDoc = await getDoc(doc(db,"users",user.uid));

        if(!userDoc.exists()){
            alert("User not found");
            return;
        }

        const data = userDoc.data();

        if(Date.now() > data.expire){
            alert("License expired");
            return;
        }

        // Redirect to main.html
        window.location.href="main.html";

    }catch(error){
        alert("Invalid login");
    }
});

</script>

</body>
</html>
