<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - WiFi Voucher</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #fff;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 400px;
        background: #ffffff;
        padding: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        border-radius: 16px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 92%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 12px;
        background-color: #d32f2f;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
    }

    button:hover {
        background-color: #b71c1c;
    }

    p {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    a {
        color: #d32f2f;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>No account? <a href="index.html">Sign up</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD7D3G3ODNufEUt9X8qLxK6-mSZA4XmtYc",
    authDomain: "getvoucher-abefa.firebaseapp.com",
    projectId: "getvoucher-abefa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
        let user = await signInWithEmailAndPassword(auth, email, password);
        let docRef = doc(db, "users", user.user.uid);
        let docSnap = await getDoc(docRef);
        let data = docSnap.data();

        if(Date.now() > data.expire){
            alert("Subscription expired");
        } else {
            window.location = "main.html";
        }
    } catch(e) {
        alert("Login error");
    }
}
// Disable right-click to make it harder makita ang source code
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});
</script>

</body>
</html>
