<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - WiFi Voucher</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 0 20px;
    }

    .container {
        max-width: 400px;
        width: 100%;
        background: #f9f9f9;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ddd;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: none;
        background-color: #d32f2f;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 10px;
        transition: background 0.2s;
    }

    button:hover {
        background-color: #b71c1c;
    }

    #demoTimer {
        text-align: center;
        font-size: 14px;
        color: #555;
    }

    small {
        display: block;
        margin-bottom: 10px;
        color: #777;
    }
</style>

<!-- Disable Right-Click -->
<script>
    document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
</script>

<!-- Firebase SDK -->
<script type="module">
    // Import Firebase modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
    apiKey: "AIzaSyD7D3G3ODNufEUt9X8qLxK6-mSZA4XmtYc",
    authDomain: "getvoucher-abefa.firebaseapp.com",
    projectId: "getvoucher-abefa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Signup button
    document.addEventListener('DOMContentLoaded', ()=>{
        const signupBtn = document.getElementById('signupBtn');
        signupBtn.addEventListener('click', async function(){
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const license = document.getElementById('license').value.trim();

            if(!username || !password || !license){
                alert("Please fill all fields and provide a license.");
                return;
            }

            try {
                // Check license in Firestore
                const licenseRef = doc(db, "licenses", license);
                const licenseSnap = await getDoc(licenseRef);
                if(!licenseSnap.exists()){
                    alert("Invalid license code!");
                    return;
                }
                if(licenseSnap.data().used){
                    alert("This license code has already been used.");
                    return;
                }

                // Create user in Firebase Auth (fake email for auth)
                const userCredential = await createUserWithEmailAndPassword(auth, username+"@temp.com", password);
                const user = userCredential.user;

                // Save user and expire info in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    username: username,
                    license: license,
                    expire: Date.now() + (30*24*60*60*1000), // 30 days
                    status: "approved"
                });

                // Mark license as used
                await updateDoc(licenseRef, {
                    used: true,
                    userId: user.uid
                });

                alert("Signup successful! You can now login.");
                window.location.href = "login.html";

            } catch(error){
                alert(error.message);
            }
        });
    });

    // Demo button + timer (3 days)
    const demoDuration = 3*24*60*60*1000; // 3 days
    let demoEnd = localStorage.getItem('demoEnd');

    if(!demoEnd){
        document.addEventListener('DOMContentLoaded', ()=>{
            const demoBtn = document.getElementById('demoBtn');
            demoBtn.addEventListener('click', ()=>{
                demoEnd = Date.now() + demoDuration;
                localStorage.setItem('demoEnd', demoEnd);
                startDemoTimer();
                alert("3-day demo activated!");
            });
        });
    } else {
        startDemoTimer();
    }

    function startDemoTimer(){
        const btn = document.getElementById('demoBtn');
        const timer = document.getElementById('demoTimer');

        const interval = setInterval(()=>{
            const remaining = demoEnd - Date.now();
            if(remaining <= 0){
                clearInterval(interval);
                btn.style.display = 'none';
                timer.style.display = 'none';
                return;
            }
            const days = Math.floor(remaining / (1000*60*60*24));
            const hours = Math.floor((remaining % (1000*60*60*24)) / (1000*60*60));
            const mins = Math.floor((remaining % (1000*60*60)) / (1000*60));
            const secs = Math.floor((remaining % (1000*60)) / 1000);

            timer.innerText = `Demo ends in ${days}d ${hours}h ${mins}m ${secs}s`;
        },1000);
    }
</script>

</head>
<body>

<div class="container">
    <h2>Signup</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="license" placeholder="License Code">
    <small>Do not use your personal email. License code is required.</small>

    <button id="signupBtn">Sign Up</button>

    <div id="demoSection">
        <button id="demoBtn">Try 3-Day Demo</button>
        <p id="demoTimer"></p>
    </div>
</div>

</body>
</html>
