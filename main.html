<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Voucher Generator</title>

<script>
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});
</script>

<style>

        /* General Interface Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        #control-panel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 900px;
            margin: 0 auto 40px auto;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"], input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: #b71c1c;
        }

        /* Voucher Grid Layout */
        #voucher-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, 3in);
            gap: 0.1in;
            justify-content: center;
        }

        /* Voucher Design (3in x 1.8in) */
        .voucher {
            width: 3in;
            height: 1.8in;
            border: 1px solid #ccc;
            background: white;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .v-title {
            color: #080808;
            font-weight: 800;
            font-size: 16pt;
            margin: 0;
            text-transform: uppercase;
        }

        .v-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10pt;
            font-weight: bold;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 2px 0;
        }

        .v-code {
            font-size: 35pt;
            font-weight: 900;
            margin: 3px 0;
            letter-spacing: 1px;
            font-family: monospace;
        }

        .v-footer {
            font-size: 11pt;
            color: #666;
            margin: 0;
            line-height: 1.2;
        }

        /* Printing logic */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            #control-panel { display: none; }
            
            @page {
                size: 13in 8.5in landscape; /* Long Bond Landscape */
                margin: 0.25in;
            }

            #voucher-container {
                display: grid;
                grid-template-columns: repeat(4, 3in); /* 4 columns fit in 13in */
                gap: 5px;
                justify-content: start;
            }

            .voucher {
                page-break-inside: avoid;
                border: 1px dashed #999; /* Dashed lines for cutting */
            }
        }
    </style>
</head>
<body>

<div id="control-panel">
    <h2 style="margin-top:0">Voucher Configuration</h2>
    <div class="input-grid">
        <div class="field">
            <label>Title (Red Text)</label>
            <input type="text" id="titleIn" value="SELECT DONG PISO WIFI" oninput="sync()">
        </div>
        <div class="field">
            <label>Price</label>
            <input type="text" id="priceIn" value="10 PESOS" oninput="sync()">
        </div>
        <div class="field">
            <label>Validity</label>
            <input type="text" id="validityIn" value="VALID 3HR" oninput="sync()">
        </div>
        <div class="field">
            <label>Footer Text</label>
            <input type="text" id="footerIn" value="Thank you for choosing our wifi. Powered By VIO WIFI" oninput="sync()">
        </div>
    </div>
    
    <div class="field" style="margin-bottom: 20px;">
        <label>Upload CSV File (Header should be "VOUCHER")</label>
        <input type="file" id="csvInput" accept=".csv">
    </div>

    <button onclick="window.print()">PRINT VOUCHERS</button>
</div>

<div id="voucher-container">
    </div>

<script>
    const csvInput = document.getElementById('csvInput');
    const container = document.getElementById('voucher-container');

    // Watch for CSV Upload
    csvInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
            const text = event.target.result;
            const rows = text.split('\n');
            const codes = [];

            // Detect column index for "VOUCHER"
            const headers = rows[0].split(',');
            const vIndex = headers.findIndex(h => h.trim().toUpperCase() === 'VOUCHER');

            if (vIndex === -1) {
                alert("CSV Error: Could not find a 'VOUCHER' column header.");
                return;
            }

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols[vIndex] && cols[vIndex].trim()) {
                    codes.push(cols[vIndex].trim());
                }
            }
            render(codes);
        };
        reader.readAsText(file);
    });

    // Generate Voucher HTML
    function render(codes) {
        container.innerHTML = '';
        codes.forEach(code => {
            const v = document.createElement('div');
            v.className = 'voucher';
            v.innerHTML = `
                <div class="v-title sync-title"></div>
                <div class="v-meta">
                    <span class="sync-price"></span>
                    <span class="sync-validity"></span>
                </div>
                <div class="v-code">${code}</div>
                <div class="v-footer sync-footer"></div>
            `;
            container.appendChild(v);
        });
        sync(); // Initial population of text
    }

    // Sync input fields to all vouchers
    function sync() {
        const t = document.getElementById('titleIn').value;
        const p = document.getElementById('priceIn').value;
        const v = document.getElementById('validityIn').value;
        const f = document.getElementById('footerIn').value;

        document.querySelectorAll('.sync-title').forEach(el => el.innerText = t);
        document.querySelectorAll('.sync-price').forEach(el => el.innerText = p);
        document.querySelectorAll('.sync-validity').forEach(el => el.innerText = v);
        document.querySelectorAll('.sync-footer').forEach(el => el.innerText = f);
    }
</script>

</body>

</html>
